<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8" />
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏭</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>儀表板 — SimHope AI 工具中心</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap"
        rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --accent: #6366F1;
            --accent2: #8B5CF6;
            --text-dark: #1E1B4B;
            --text-mid: #6B7280;
            --bg: linear-gradient(135deg, #E0E7FF 0%, #F0FDF4 40%, #FEF9C3 100%);
            --white: #fff;
            --radius: 16px;
            --shadow: 0 6px 24px rgba(30, 27, 75, 0.06)
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            color: var(--text-dark)
        }

        /* Nav */
        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 5%;
            background: rgba(255, 255, 255, 0.82);
            backdrop-filter: blur(20px);
            border-bottom: 1.5px solid rgba(30, 27, 75, 0.06);
            position: sticky;
            top: 0;
            z-index: 100
        }

        .nav-logo {
            font-weight: 900;
            font-size: 1rem;
            color: var(--text-dark);
            text-decoration: none
        }

        .nav-right {
            display: flex;
            gap: 10px;
            align-items: center
        }

        .nav-user {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: .82rem;
            font-weight: 700
        }

        .nav-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .8rem;
            font-weight: 900
        }

        .nav-btn {
            padding: 6px 14px;
            border-radius: 8px;
            font-size: .78rem;
            font-weight: 700;
            text-decoration: none;
            transition: all .15s;
            border: none;
            cursor: pointer;
            font-family: inherit
        }

        .nav-btn-ghost {
            background: none;
            color: var(--text-mid)
        }

        .nav-btn-ghost:hover {
            color: var(--accent)
        }

        /* Layout */
        .dash-wrap {
            max-width: 1100px;
            margin: 0 auto;
            padding: 32px 5% 80px
        }

        /* Profile header */
        .profile-header {
            display: flex;
            gap: 24px;
            align-items: flex-start;
            margin-bottom: 28px
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            font-weight: 900;
            flex-shrink: 0
        }

        .profile-info {
            flex: 1
        }

        .profile-name {
            font-size: 1.5rem;
            font-weight: 900
        }

        .profile-role-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: .7rem;
            font-weight: 800;
            margin-left: 8px
        }

        .role-admin {
            background: rgba(239, 68, 68, 0.1);
            color: #DC2626
        }

        .role-developer {
            background: rgba(99, 102, 241, 0.1);
            color: var(--accent)
        }

        .profile-email {
            font-size: .82rem;
            color: var(--text-mid);
            margin-top: 2px
        }

        .profile-bio {
            font-size: .85rem;
            color: var(--text-dark);
            margin-top: 6px
        }

        /* Stats row */
        .stats-row {
            display: flex;
            gap: 16px;
            margin-bottom: 24px
        }

        .stat-box {
            background: var(--white);
            border-radius: 12px;
            padding: 16px 20px;
            box-shadow: var(--shadow);
            border: 1.5px solid rgba(255, 255, 255, 0.9);
            flex: 1;
            text-align: center
        }

        .stat-box-num {
            font-size: 1.6rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text
        }

        .stat-box-label {
            font-size: .72rem;
            color: var(--text-mid);
            font-weight: 700;
            margin-top: 2px
        }

        /* Sidebar layout */
        .dash-layout {
            max-width: 1200px;
            margin: 0 auto;
            padding: 28px 4% 80px;
            display: grid;
            grid-template-columns: 220px 1fr;
            gap: 24px;
            align-items: start
        }

        .dash-sidebar {
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1.5px solid rgba(255, 255, 255, .9);
            overflow: hidden;
            position: sticky;
            top: 80px
        }

        .sidebar-profile {
            padding: 20px 18px 16px;
            border-bottom: 1.5px solid rgba(30, 27, 75, .06)
        }

        .sidebar-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            font-weight: 900;
            margin-bottom: 10px
        }

        .sidebar-name {
            font-weight: 800;
            font-size: .9rem;
            line-height: 1.2
        }

        .sidebar-email {
            font-size: .72rem;
            color: var(--text-mid);
            margin-top: 2px
        }

        .sidebar-role {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: .65rem;
            font-weight: 800;
            margin-top: 6px
        }

        .nav-group {
            padding: 10px 0 4px
        }

        .nav-group-label {
            font-size: .62rem;
            font-weight: 800;
            color: var(--text-mid);
            text-transform: uppercase;
            letter-spacing: .6px;
            padding: 4px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between
        }

        .nav-group-toggle {
            background: none;
            border: none;
            cursor: pointer;
            font-size: .75rem;
            color: var(--text-mid);
            padding: 2px 4px;
            border-radius: 4px;
            transition: background .15s
        }

        .nav-group-toggle:hover {
            background: rgba(30, 27, 75, .06)
        }

        .nav-group-items {
            overflow: hidden;
            transition: max-height .25s ease
        }

        .nav-group-items.collapsed {
            max-height: 0 !important
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 9px 18px;
            font-size: .82rem;
            font-weight: 700;
            color: var(--text-mid);
            cursor: pointer;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            font-family: inherit;
            transition: all .15s;
            border-radius: 0;
            position: relative
        }

        .nav-item:hover {
            background: rgba(99, 102, 241, .05);
            color: var(--accent)
        }

        .nav-item.active {
            background: rgba(99, 102, 241, .08);
            color: var(--accent)
        }

        .nav-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 20%;
            height: 60%;
            width: 3px;
            background: var(--accent);
            border-radius: 0 4px 4px 0
        }

        .nav-badge {
            margin-left: auto;
            background: rgba(99, 102, 241, .12);
            color: var(--accent);
            padding: 1px 7px;
            border-radius: 10px;
            font-size: .64rem;
            font-weight: 800
        }

        .nav-badge-warn {
            background: rgba(245, 158, 11, .15);
            color: #D97706
        }

        .sidebar-footer {
            padding: 12px;
            border-top: 1.5px solid rgba(30, 27, 75, .06);
            display: flex;
            flex-direction: column;
            gap: 6px
        }

        .logout-btn-full {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px;
            border-radius: 10px;
            font-size: .82rem;
            font-weight: 800;
            cursor: pointer;
            border: 1.5px solid rgba(239, 68, 68, .25);
            background: rgba(239, 68, 68, .06);
            color: #DC2626;
            font-family: inherit;
            transition: all .15s
        }

        .logout-btn-full:hover {
            background: #DC2626;
            color: #fff
        }

        .home-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 8px;
            border-radius: 10px;
            font-size: .78rem;
            font-weight: 700;
            cursor: pointer;
            border: 1.5px solid rgba(30, 27, 75, .1);
            background: none;
            color: var(--text-mid);
            text-decoration: none;
            transition: all .15s
        }

        .home-btn:hover {
            background: rgba(30, 27, 75, .06);
            color: var(--text-dark)
        }

        .dash-content {
            min-width: 0
        }

        /* Stats mini row */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 20px
        }

        .stat-box {
            background: var(--white);
            border-radius: 12px;
            padding: 14px 16px;
            box-shadow: var(--shadow);
            border: 1.5px solid rgba(255, 255, 255, .9);
            text-align: center
        }

        .stat-box-num {
            font-size: 1.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text
        }

        .stat-box-label {
            font-size: .7rem;
            color: var(--text-mid);
            font-weight: 700;
            margin-top: 2px
        }

        /* Tab pane */
        .tab-pane {
            display: none
        }

        .tab-pane.active {
            display: block
        }

        /* Cards list */
        .card-list {
            display: flex;
            flex-direction: column;
            gap: 12px
        }

        .item-card {
            background: var(--white);
            border-radius: 14px;
            padding: 18px 20px;
            box-shadow: var(--shadow);
            border: 1.5px solid rgba(255, 255, 255, .9);
            display: flex;
            gap: 14px;
            align-items: flex-start;
            transition: transform .15s
        }

        .item-card:hover {
            transform: translateY(-2px)
        }

        .item-icon {
            font-size: 1.6rem;
            flex-shrink: 0;
            width: 40px;
            text-align: center
        }

        .item-body {
            flex: 1;
            min-width: 0
        }

        .item-title {
            font-size: .92rem;
            font-weight: 800
        }

        .item-sub {
            font-size: .78rem;
            color: var(--text-mid);
            margin-top: 2px
        }

        .item-badges {
            display: flex;
            gap: 6px;
            margin-top: 8px;
            flex-wrap: wrap
        }

        .badge {
            padding: 2px 10px;
            border-radius: 20px;
            font-size: .68rem;
            font-weight: 700
        }

        .badge-approved {
            background: rgba(22, 163, 74, .1);
            color: #16A34A
        }

        .badge-pending {
            background: rgba(245, 158, 11, .1);
            color: #D97706
        }

        .badge-rejected {
            background: rgba(239, 68, 68, .1);
            color: #DC2626
        }

        .item-actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
            align-items: center
        }

        .act-btn {
            padding: 6px 12px;
            border-radius: 8px;
            font-size: .72rem;
            font-weight: 700;
            cursor: pointer;
            transition: all .15s;
            border: 1.5px solid rgba(30, 27, 75, .08);
            background: var(--white);
            font-family: inherit
        }

        .act-btn:hover {
            border-color: var(--accent);
            color: var(--accent)
        }

        .act-btn-approve {
            border-color: #16A34A;
            color: #16A34A
        }

        .act-btn-approve:hover {
            background: #16A34A;
            color: #fff
        }

        .act-btn-reject {
            border-color: #DC2626;
            color: #DC2626
        }

        .act-btn-reject:hover {
            background: #DC2626;
            color: #fff
        }

        /* Form */
        .form-card {
            background: var(--white);
            border-radius: var(--radius);
            padding: 28px;
            box-shadow: var(--shadow);
            border: 1.5px solid rgba(255, 255, 255, .9)
        }

        .form-card h3 {
            font-size: 1.1rem;
            font-weight: 900;
            margin-bottom: 18px
        }

        .fg {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-bottom: 14px
        }

        .fg label {
            font-size: .72rem;
            font-weight: 700;
            color: var(--text-mid);
            text-transform: uppercase;
            letter-spacing: .4px
        }

        .fg input,
        .fg select,
        .fg textarea {
            padding: 10px 14px;
            border: 2px solid rgba(30, 27, 75, .1);
            border-radius: 10px;
            font-size: .85rem;
            font-family: inherit;
            outline: none;
            transition: border .2s;
            width: 100%
        }

        .fg input:focus,
        .fg select:focus,
        .fg textarea:focus {
            border-color: var(--accent)
        }

        .fg textarea {
            min-height: 80px;
            resize: vertical
        }

        .fg-row {
            display: flex;
            gap: 12px
        }

        .fg-row .fg {
            flex: 1
        }

        .submit-btn {
            padding: 12px 28px;
            border: none;
            border-radius: 12px;
            font-size: .9rem;
            font-weight: 800;
            font-family: inherit;
            cursor: pointer;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
            box-shadow: 0 4px 16px rgba(99, 102, 241, .25);
            transition: all .2s
        }

        .submit-btn:hover {
            transform: translateY(-2px)
        }

        .submit-btn:disabled {
            opacity: .6;
            cursor: not-allowed;
            transform: none
        }

        .empty-state {
            text-align: center;
            padding: 48px 20px;
            color: var(--text-mid)
        }

        .empty-state-icon {
            font-size: 2.5rem;
            margin-bottom: 8px
        }

        .empty-state-text {
            font-size: .9rem;
            font-weight: 700
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--text-dark);
            color: #fff;
            padding: 10px 22px;
            border-radius: 30px;
            font-size: .85rem;
            font-weight: 800;
            z-index: 9999;
            box-shadow: 0 6px 20px rgba(0, 0, 0, .25);
            transition: opacity .4s
        }

        /* Users grid */
        .users-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 14px
        }

        .user-card {
            background: var(--white);
            border-radius: 14px;
            padding: 18px;
            box-shadow: var(--shadow);
            border: 1.5px solid rgba(255, 255, 255, .9);
            display: flex;
            gap: 12px;
            align-items: center
        }

        .user-card-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            flex-shrink: 0
        }

        .user-card-info {
            flex: 1;
            min-width: 0
        }

        .user-card-name {
            font-weight: 800;
            font-size: .88rem
        }

        .user-card-email {
            font-size: .72rem;
            color: var(--text-mid);
            overflow: hidden;
            text-overflow: ellipsis
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-mid);
            font-weight: 700
        }

        @media(max-width:800px) {
            .dash-layout {
                grid-template-columns: 1fr;
            }

            .dash-sidebar {
                position: static;
                display: flex;
                flex-wrap: wrap;
                border-radius: 12px;
            }

            .sidebar-profile {
                display: none
            }

            .nav-group {
                padding: 6px 0
            }

            .sidebar-footer {
                flex-direction: row
            }

            .stats-row {
                grid-template-columns: repeat(2, 1fr)
            }
        }

        /* Overlay for Edit Modals */
        .edit-modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 999;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .edit-modal-overlay.open {
            display: flex;
        }

        .edit-modal {
            background: var(--white);
            border-radius: var(--radius);
            width: 100%;
            max-width: 600px;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.2);
            animation: modalIn 0.2s ease-out;
        }

        .edit-modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .edit-modal-header h3 {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--text-dark);
        }

        .edit-modal-close {
            background: var(--bg-alt);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .edit-modal-body {
            padding: 20px 24px;
            overflow-y: auto;
            flex: 1;
        }

        .edit-modal-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            background: var(--bg-main);
        }

        /* Versions Row */
        .versions-wrap {
            border: 2px solid var(--border);
            border-radius: var(--radius);
            padding: 12px;
            margin-top: 6px;
        }

        .version-row {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
            align-items: stretch;
        }

        .version-row .d-input {
            border: 1.5px solid var(--border);
            border-radius: 8px;
        }

        .add-version-btn {
            background: var(--bg-alt);
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 700;
            border: none;
            cursor: pointer;
            margin-top: 8px;
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }
    </style>
</head>

<body>
    <nav>
        <a class="nav-logo" href="index.html">🏭 SimHope AI 工具中心</a>
        <div class="nav-right">
            <div class="nav-user" id="navUser"></div>
        </div>
    </nav>

    <div class="dash-layout">
        <aside class="dash-sidebar" id="dashSidebar">⏳ 載入中...</aside>
        <main class="dash-content" id="dashWrap">
            <div class="loading" id="loadingState">⏳ 載入中…</div>
        </main>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="data.js"></script>

    <script>
        let currentUser = null;
        let currentProfile = null;
        let myTools = [];
        let myPainCards = [];
        let pendingTools = [];
        let pendingPainCards = [];
        let allUsers = [];
        let allToolsAdmin = [];
        let allPainCardsAdmin = [];
        let editingToolId = null;
        let editingPainId = null;

        async function handleLogout() {
            await Auth.logout();
            location.href = 'auth.html';
        }

        function showToast(msg) {
            const t = document.createElement('div');
            t.className = 'toast'; t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 400); }, 2200);
        }

        // ── Init ──
        Auth.onAuthChange(async user => {
            if (!user) { location.href = 'auth.html'; return; }
            currentUser = user;
            currentProfile = await Auth.getUserProfile(user.uid);
            if (!currentProfile) {
                // Profile doesn't exist yet, create it
                await db.collection('users').doc(user.uid).set({
                    email: user.email,
                    displayName: user.displayName || user.email.split('@')[0],
                    role: 'developer',
                    avatarUrl: '',
                    bio: '',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                currentProfile = await Auth.getUserProfile(user.uid);
            }
            initDashboard();
        });

        async function initDashboard() {
            const isAdmin = currentProfile.role === 'admin';
            const name = currentProfile.displayName || currentUser.displayName || currentUser.email;

            // Nav user
            document.getElementById('navUser').innerHTML = `
                <div class="nav-avatar">${name.charAt(0).toUpperCase()}</div>
                <span>${name}</span>
            `;

            // Load data
            myTools = await FireDB.getToolsByAuthor(currentUser.uid);
            myPainCards = await FireDB.getPainCardsByAuthor(currentUser.uid);
            if (isAdmin) {
                pendingTools = await FireDB.getPendingTools();
                pendingPainCards = await FireDB.getPendingPainCards();
                allUsers = await FireDB.getAllUsers();
                allToolsAdmin = await FireDB.getAllTools();
                allPainCardsAdmin = await FireDB.getApprovedPainCards();

        // ── Handlers ──
        async function handleSubmitTool(e) {
            e.preventDefault();
            const btn = document.getElementById('ntSubmit');
            btn.disabled = true;
            const isAdmin = currentProfile.role === 'admin';
            const data = {
                title: document.getElementById('nt-title').value.trim(),
                icon: document.getElementById('nt-icon').value.trim() || '🛠️',
                tagline: document.getElementById('nt-tagline').value.trim(),
                desc: document.getElementById('nt-desc').value.trim(),
                dept: document.getElementById('nt-dept').value,
                type: document.getElementById('nt-type').value,
                status: isAdmin ? (document.getElementById('nt-status')?.value || 'live') : 'dev',
                url: document.getElementById('nt-url').value.trim() || '#',
                tags: document.getElementById('nt-tags').value.split(',').map(s => s.trim()).filter(Boolean),
                steps: document.getElementById('nt-steps').value.split(',').map(s => s.trim()).filter(Boolean),
                color: 'c' + (Math.floor(Math.random() * 6) + 1),
                blog: { summary: '', blocks: [] }
            };
            try {
                if (isAdmin) {
                    await FireDB.submitToolDirect(data, currentUser.uid);
                    showToast('🚀 工具已直接上架！');
                } else {
                    await FireDB.submitTool(data, currentUser.uid);
                    showToast('📤 工具已提交，等待管理員審核');
                }
                await initDashboard();
            } catch (err) {
                showToast('❌ 提交失敗：' + err.message);
            } finally {
                btn.disabled = false;
            }
        }

        async function handleSubmitPain(e) {
            e.preventDefault();
            const btn = document.getElementById('npSubmit');
            btn.disabled = true;
            const isAdmin = currentProfile.role === 'admin';
            const data = {
                dept: document.getElementById('np-dept').value,
                before: document.getElementById('np-before').value.trim(),
                after: document.getElementById('np-after').value.trim()
            };
            try {
                if (isAdmin) {
                    await FireDB.submitPainCardDirect(data, currentUser.uid);
                    showToast('🚀 痛點卡片已直接上架！');
                } else {
                    await FireDB.submitPainCard(data, currentUser.uid);
                    showToast('📤 痛點卡片已提交，等待管理員審核');
                }
                await initDashboard();
            } catch (err) {
                showToast('❌ 提交失敗：' + err.message);
            } finally {
                btn.disabled = false;
            }
        }

            try {
                if (type === 'tool') await FireDB.approveTool(id, currentUser.uid);
                else await FireDB.approvePainCard(id, currentUser.uid);

                await initDashboard();
            } catch (err) { showToast('❌ 操作失敗：' + err.message); }
        }

            const reason = prompt('退回原因（選填）：');
            try {
                if (type === 'tool') await FireDB.rejectTool(id, currentUser.uid, reason);
                else await FireDB.rejectPainCard(id, currentUser.uid, reason);
                showToast('❌ 已退回');
                await initDashboard();
            } catch (err) { showToast('❌ 操作失敗：' + err.message); }
        }

        async function changeToolStatus(toolId, newStatus) {
            const label = newStatus === 'terminated' ? '下架' : '上架';
            if (!confirm(`確定要將此工具「${label}」？`)) return;
            try {
                await FireDB.updateTool(toolId, { status: newStatus });
                showToast(`✅ 工具已${label} `);
                await initDashboard();
            } catch (err) { showToast('❌ 操作失敗：' + err.message); }
        }

        async function deleteItem(type, id) {
            if (!confirm(`確定要尠7刪除？此操作無法復原。`)) return;
            try {
                if (type === 'tool') await FireDB.deleteTool(id);
                else await FireDB.deletePainCard(id);
                showToast('🗑️ 已刪除');
                await initDashboard();
            } catch (err) { showToast('❌ 操作失敗：' + err.message); }
        }

        async function setUserRole(uid, role) {
            const label = role === 'admin' ? '管理員' : '開發者';
            if (!confirm(`確定要將此使用者設為「${label}」？`)) return;
            try {
                await FireDB.setUserRole(uid, role);
                showToast(`✅ 已設為${label} `);
                await initDashboard();
            } catch (err) { showToast('❌ 操作失敗：' + err.message); }
        }

        async function revokeAccess(uid) {
            if (!confirm('確定要移除此張開發者的權限？他將無法登入 Dashboard。')) return;
            try {
                await firebase.firestore().collection('users').doc(uid).update({ role: 'revoked' });
                showToast('⛔ 已移除開發者權限');
                await initDashboard();
            } catch (err) { showToast('❌ 操作失敗：' + err.message); }
        }

        async function promoteUser(uid) {
            await setUserRole(uid, 'admin');
        }

        // ── Add Developer (Admin) ──
        async function handleAddDeveloper(e) {
            e.preventDefault();
            const btn = document.getElementById('adSubmit');
            btn.disabled = true;
            btn.textContent = '建立中...';

            const name = document.getElementById('ad-name').value.trim();
            const email = document.getElementById('ad-email').value.trim();
            const pass = document.getElementById('ad-pass').value;
            const role = document.getElementById('ad-role').value;

            // 使用 Firebase REST API 建立帳號（不影響目前管理員 session）
            const apiKey = firebase.app().options.apiKey;
            try {
                const res = await fetch(
                    `https://identitytoolkit.googleapis.com/v1/accounts:signUp?key=${apiKey}`,
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password: pass, returnSecureToken: false })
                    }
                );
                const data = await res.json();
                if (data.error) throw new Error(data.error.message);

                const newUid = data.localId;
                // 建立 Firestore user doc
                await firebase.firestore().collection('users').doc(newUid).set({
                    email,
                    displayName: name,
                    role,
                    avatarUrl: '',
                    bio: '',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                // 更新 displayName（via REST）
                await fetch(
                    `https://identitytoolkit.googleapis.com/v1/accounts:update?key=${apiKey}`,
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ idToken: data.idToken, displayName: name })
                    }
                );

                const roleLabel = role === 'admin' ? '管理員' : '開發者';
                showToast(`✅ ${roleLabel}帳號「${name}」已建立！`);
                document.getElementById('addDevForm').reset();
                await initDashboard();
            } catch (err) {
                const msg = err.message === 'EMAIL_EXISTS' ? 'Email 已被使用' : err.message;
                showToast('❌ 建立失敗：' + msg);
            } finally {
                btn.disabled = false;
                btn.textContent = '+ 建立帳號';
            }
        }

        // ── Modals logic ──
        function closeEditModal(type) {
            document.getElementById('edit' + (type === 'tool' ? 'Tool' : 'Pain') + 'Modal').classList.remove('open');
            editingToolId = null;
            editingPainId = null;
        }

        function addVersionRow(version = '', releaseNotes = '', fileUrl = '') {
            const wrap = document.getElementById('et-versions-wrap');
            const row = document.createElement('div');
            row.className = 'version-row';
            row.style.display = 'flex';
            row.style.gap = '8px';
            row.style.marginBottom = '8px';
            row.style.alignItems = 'center';
            row.innerHTML = `
                <input type="text" placeholder="版號(如v1)" value="${version}" class="v-ver" required style="width:70px; padding: 6px; border: 1px solid #ccc; border-radius: 6px;">
                <input type="text" placeholder="更新說明" value="${releaseNotes}" class="v-note" style="flex:1; padding: 6px; border: 1px solid #ccc; border-radius: 6px;">
                <input type="url" placeholder="下載連結URL" value="${fileUrl}" class="v-url" required style="flex:2; padding: 6px; border: 1px solid #ccc; border-radius: 6px;">
                <button type="button" class="act-btn act-btn-reject" onclick="this.parentElement.remove()" style="padding: 6px 10px; flex-shrink:0;">✕</button>
            `;
            wrap.appendChild(row);
        }

        function getVersionsData() {
            const rows = document.querySelectorAll('#et-versions-wrap .version-row');
            const versions = [];
            rows.forEach(r => {
                versions.push({
                    version: r.querySelector('.v-ver').value.trim(),
                    releaseNotes: r.querySelector('.v-note').value.trim(),
                    fileUrl: r.querySelector('.v-url').value.trim(),
                });
            });
            return versions;
        }

        // ── Edit Handlers ──
        function editTool(id) {
            let t = myTools.find(x => x.id === id) || allToolsAdmin.find(x => x.id === id);
            if (!t) return;
            editingToolId = id;
            document.getElementById('et-title').value = t.title || '';
            document.getElementById('et-icon').value = t.icon || '';
            document.getElementById('et-tagline').value = t.tagline || '';
            document.getElementById('et-desc').value = t.desc || '';
            document.getElementById('et-dept').value = t.dept || Object.keys(DB.DEPTS)[0];
            document.getElementById('et-type').value = t.type || 'webapp';
            if (currentProfile?.role === 'admin') {
                document.getElementById('et-status-container').style.display = 'block';
                const st = document.getElementById('et-status');
                if (st) st.value = t.status || 'live';
            } else {
                if (document.getElementById('et-status-container')) {
                    document.getElementById('et-status-container').style.display = 'none';
                }
            }
            document.getElementById('et-url').value = t.url || '';
            document.getElementById('et-tags').value = (t.tags || []).join(', ');
            document.getElementById('et-steps').value = (t.steps || []).join(', ');

            const vWrap = document.getElementById('et-versions-wrap');
            if (vWrap) {
                vWrap.innerHTML = '';
                if (t.versions && t.versions.length) {
                    t.versions.forEach(v => addVersionRow(v.version, v.releaseNotes, v.fileUrl));
                }
            }

            document.getElementById('editToolModal').classList.add('open');
        }

        function editPain(id) {
            let c = myPainCards.find(x => x.id === id) || allPainCardsAdmin.find(x => x.id === id);
            if (!c) return;
            editingPainId = id;
            document.getElementById('ep-dept').value = c.dept || Object.keys(DB.DEPTS)[0];
            document.getElementById('ep-before').value = c.before || '';
            document.getElementById('ep-after').value = c.after || '';
            document.getElementById('editPainModal').classList.add('open');
        }

        async function handleUpdateTool(e) {
            e.preventDefault();
            if (!editingToolId) return;
            const btn = document.getElementById('etSubmit');
            btn.disabled = true;
            const isAdmin = currentProfile.role === 'admin';
            const data = {
                title: document.getElementById('et-title').value.trim(),
                icon: document.getElementById('et-icon').value.trim() || '🛠️',
                tagline: document.getElementById('et-tagline').value.trim(),
                desc: document.getElementById('et-desc').value.trim(),
                dept: document.getElementById('et-dept').value,
                type: document.getElementById('et-type').value,
                url: document.getElementById('et-url').value.trim() || '#',
                tags: document.getElementById('et-tags').value.split(',').map(s => s.trim()).filter(Boolean),
                steps: document.getElementById('et-steps').value.split(',').map(s => s.trim()).filter(Boolean),
                versions: getVersionsData()
            };
            if (isAdmin) data.status = document.getElementById('et-status')?.value || 'live';

            try {
                await FireDB.updateTool(editingToolId, data);
                showToast('✅ 工具已更新');
                closeEditModal('tool');
                await initDashboard();
            } catch (err) {
                showToast('❌ 更新失敗：' + err.message);
            } finally {
                btn.disabled = false;
            }
        }

        async function handleUpdatePain(e) {
            e.preventDefault();
            if (!editingPainId) return;
            const btn = document.getElementById('epSubmit');
            btn.disabled = true;
            const isAdmin = currentProfile.role === 'admin';
            const data = {
                dept: document.getElementById('ep-dept').value,
                before: document.getElementById('ep-before').value.trim(),
                after: document.getElementById('ep-after').value.trim()
            };
            try {
                await FireDB.updatePainCard(editingPainId, data);
                showToast('✅ 痛點卡片已更新');
                closeEditModal('pain');
                await initDashboard();
            } catch (err) {
                showToast('❌ 更新失敗：' + err.message);
            } finally {
                btn.disabled = false;
            }
        }
    </script>

    <!-- Edit Tool Modal -->
    <div class="edit-modal-overlay" id="editToolModal">
        <form class="edit-modal" id="editToolForm" onsubmit="handleUpdateTool(event)">
            <div class="edit-modal-header">
                <h3>✏️ 編輯工具</h3>
                <button type="button" class="edit-modal-close" onclick="closeEditModal('tool')">×</button>
            </div>
            <div class="edit-modal-body">
                <div class="fg-row">
                    <div class="fg">
                        <label>工具名稱</label>
                        <input type="text" id="et-title" required>
                    </div>
                    <div class="fg">
                        <label>圖示 (Emoji)</label>
                        <input type="text" id="et-icon" required>
                    </div>
                </div>
                <div class="fg">
                    <label>一句話賣點</label>
                    <input type="text" id="et-tagline" required>
                </div>
                <div class="fg">
                    <label>詳細說明</label>
                    <textarea id="et-desc" rows="3" required></textarea>
                </div>
                <div class="fg-row">
                    <div class="fg">
                        <label>所屬部門</label>
                        <select id="et-dept" required>
                            <script>document.write(Object.entries(DB.DEPTS).map(([k, v]) => `<option value="${k}">${v.icon} ${v.name}</option>`).join(''))</script>
                        </select>
                    </div>
                    <div class="fg">
                        <label>工具類型</label>
                        <select id="et-type" required>
                            <option value="webapp">網頁應用 (WebApp)</option>
                            <option value="desktop">電腦軟體 (Desktop)</option>
                            <option value="prompt">提示詞 (Prompt)</option>
                            <option value="api">API 服務</option>
                            <option value="gpts">GPTs</option>
                        </select>
                    </div>
                </div>
                <div class="fg" id="et-status-container" style="display:none">
                    <label>上架狀態 (管理員專用)</label>
                    <select id="et-status">
                        <option value="live">✅ 正常上架</option>
                        <option value="dev">🚧 開發中</option>
                        <option value="terminated">🔕 已下架</option>
                    </select>
                </div>
                <div class="fg">
                    <label>主要連結 (URL)</label>
                    <input type="url" id="et-url">
                </div>
                <div class="fg">
                    <label>標籤 (用逗號分隔)</label>
                    <input type="text" id="et-tags">
                </div>
                <div class="fg">
                    <label>步驟 (用逗號分隔)</label>
                    <input type="text" id="et-steps">
                </div>
                <div class="fg">
                    <label>歷史版本 (下載連結)</label>
                    <div class="versions-wrap" id="et-versions-wrap"></div>
                    <button type="button" class="add-version-btn" onclick="addVersionRow()">+ 新增版本</button>
                    <div class="hint" style="font-size:0.8rem;color:#888;margin-top:4px;">若為下載軟體，請填寫版本號、更新說明與下載連結。</div>
                </div>
            </div>
            <div class="edit-modal-footer">
                <button type="button" class="act-btn" onclick="closeEditModal('tool')">取消</button>
                <button type="submit" class="submit-btn" id="etSubmit" style="padding:8px 16px;margin:0;">儲存變更</button>
            </div>
        </form>
    </div>

    <!-- Edit Pain Modal -->
    <div class="edit-modal-overlay" id="editPainModal">
        <form class="edit-modal" id="editPainForm" onsubmit="handleUpdatePain(event)">
            <div class="edit-modal-header">
                <h3>✏️ 編輯痛點卡片</h3>
                <button type="button" class="edit-modal-close" onclick="closeEditModal('pain')">×</button>
            </div>
            <div class="edit-modal-body">
                <div class="fg">
                    <label>相關部門</label>
                    <select id="ep-dept" required>
                        <script>document.write(Object.entries(DB.DEPTS).map(([k, v]) => `<option value="${k}">${v.icon} ${v.name}</option>`).join(''))</script>
                    </select>
                </div>
                <div class="fg">
                    <label>痛點 (Before)</label>
                    <textarea id="ep-before" rows="3" required></textarea>
                </div>
                <div class="fg">
                    <label>解決方案 (After)</label>
                    <textarea id="ep-after" rows="3" required></textarea>
                </div>
            </div>
            <div class="edit-modal-footer">
                <button type="button" class="act-btn" onclick="closeEditModal('pain')">取消</button>
                <button type="submit" class="submit-btn" id="epSubmit" style="padding:8px 16px;margin:0;">儲存變更</button>
            </div>
        </form>
    </div>
</body>

</html>
