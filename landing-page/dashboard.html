<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8" />
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏭</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>儀表板 — SimHope AI 工具中心</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap"
        rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --accent: #6366F1;
            --accent2: #8B5CF6;
            --text-dark: #1E1B4B;
            --text-mid: #6B7280;
            --bg: linear-gradient(135deg, #E0E7FF 0%, #F0FDF4 40%, #FEF9C3 100%);
            --white: #fff;
            --radius: 16px;
            --shadow: 0 6px 24px rgba(30, 27, 75, 0.06);
            --nav-bg: rgba(255, 255, 255, 0.82);
            --nav-border: rgba(30, 27, 75, 0.06);
            --card-border: rgba(255, 255, 255, 0.9);
            --border-light: rgba(30, 27, 75, 0.1);
        }

        :root.dark {
            --bg: #111827;
            --text-dark: #F9FAFB;
            --text-mid: #9CA3AF;
            --white: #1F2937;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
            --nav-bg: rgba(17, 24, 39, 0.85);
            --nav-border: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.05);
            --border-light: rgba(255, 255, 255, 0.1);
        }

        .dark nav {
            background: var(--nav-bg);
            border-color: var(--nav-border);
        }

        .dark .stat-box,
        .dark .dash-sidebar,
        .dark .form-card,
        .dark .user-card,
        .dark .item-card,
        .dark .edit-modal {
            background: var(--white);
            border-color: var(--card-border);
        }

        .dark .empty-state {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--border-light);
        }

        .dark .fg input,
        .dark .fg select,
        .dark .fg textarea,
        .dark .act-btn,
        .dark .home-btn,
        .dark .nav-group-toggle {
            background: rgba(0, 0, 0, 0.2);
            border-color: var(--border-light);
            color: var(--text-dark);
        }

        .dark .sidebar-profile,
        .dark .sidebar-footer,
        .dark .edit-modal-header,
        .dark .edit-modal-footer {
            border-color: var(--border-light);
        }

        .dark .edit-modal-footer {
            background: var(--bg);
        }

        .dark .user-card-name span {
            color: var(--text-mid);
        }

        .theme-btn {
            background: none;
            border: 2px solid rgba(99, 102, 241, 0.3);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.05rem;
            cursor: pointer;
            color: var(--text-dark);
            transition: all 0.2s;
            margin-right: 8px;
        }

        .theme-btn:hover {
            background: rgba(99, 102, 241, 0.1);
            transform: rotate(15deg);
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            color: var(--text-dark)
        }

        /* Nav */
        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 5%;
            background: var(--nav-bg);
            backdrop-filter: blur(20px);
            border-bottom: 1.5px solid var(--nav-border);
            position: sticky;
            top: 0;
            z-index: 100
        }

        .nav-logo {
            font-weight: 900;
            font-size: 1rem;
            color: var(--text-dark);
            text-decoration: none
        }

        .nav-right {
            display: flex;
            gap: 10px;
            align-items: center
        }

        .nav-user {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: .82rem;
            font-weight: 700
        }

        .nav-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .8rem;
            font-weight: 900
        }

        .nav-btn {
            padding: 6px 14px;
            border-radius: 8px;
            font-size: .78rem;
            font-weight: 700;
            text-decoration: none;
            transition: all .15s;
            border: none;
            cursor: pointer;
            font-family: inherit
        }

        .nav-btn-ghost {
            background: none;
            color: var(--text-mid)
        }

        .nav-btn-ghost:hover {
            color: var(--accent)
        }

        /* Layout */
        .dash-wrap {
            max-width: 1100px;
            margin: 0 auto;
            padding: 32px 5% 80px
        }

        /* Profile header */
        .profile-header {
            display: flex;
            gap: 24px;
            align-items: flex-start;
            margin-bottom: 28px
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            font-weight: 900;
            flex-shrink: 0
        }

        .profile-info {
            flex: 1
        }

        .profile-name {
            font-size: 1.5rem;
            font-weight: 900
        }

        .profile-role-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: .7rem;
            font-weight: 800;
            margin-left: 8px
        }

        .role-admin {
            background: rgba(239, 68, 68, 0.1);
            color: #DC2626
        }

        .role-developer {
            background: rgba(99, 102, 241, 0.1);
            color: var(--accent)
        }

        .profile-email {
            font-size: .82rem;
            color: var(--text-mid);
            margin-top: 2px
        }

        .profile-bio {
            font-size: .85rem;
            color: var(--text-dark);
            margin-top: 6px
        }

        /* Stats row */
        .stats-row {
            display: flex;
            gap: 16px;
            margin-bottom: 24px
        }

        .stat-box {
            background: var(--white);
            border-radius: 12px;
            padding: 16px 20px;
            box-shadow: var(--shadow);
            border: 1.5px solid var(--card-border);
            flex: 1;
            text-align: center
        }

        .stat-box-num {
            font-size: 1.6rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text
        }

        .stat-box-label {
            font-size: .72rem;
            color: var(--text-mid);
            font-weight: 700;
            margin-top: 2px
        }

        /* Sidebar layout */
        .dash-layout {
            max-width: 1200px;
            margin: 0 auto;
            padding: 28px 4% 80px;
            display: grid;
            grid-template-columns: 220px 1fr;
            gap: 24px;
            align-items: start
        }

        .dash-sidebar {
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1.5px solid rgba(255, 255, 255, .9);
            overflow: hidden;
            position: sticky;
            top: 80px
        }

        .sidebar-profile {
            padding: 20px 18px 16px;
            border-bottom: 1.5px solid rgba(30, 27, 75, .06)
        }

        .sidebar-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            font-weight: 900;
            margin-bottom: 10px
        }

        .sidebar-name {
            font-weight: 800;
            font-size: .9rem;
            line-height: 1.2
        }

        .sidebar-email {
            font-size: .72rem;
            color: var(--text-mid);
            margin-top: 2px
        }

        .sidebar-role {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: .65rem;
            font-weight: 800;
            margin-top: 6px
        }

        .nav-group {
            padding: 10px 0 4px
        }

        .nav-group-label {
            font-size: .62rem;
            font-weight: 800;
            color: var(--text-mid);
            text-transform: uppercase;
            letter-spacing: .6px;
            padding: 4px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between
        }

        .nav-group-toggle {
            background: none;
            border: none;
            cursor: pointer;
            font-size: .75rem;
            color: var(--text-mid);
            padding: 2px 4px;
            border-radius: 4px;
            transition: background .15s
        }

        .nav-group-toggle:hover {
            background: rgba(30, 27, 75, .06)
        }

        .nav-group-items {
            overflow: hidden;
            transition: max-height .25s ease
        }

        .nav-group-items.collapsed {
            max-height: 0 !important
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 9px 18px;
            font-size: .82rem;
            font-weight: 700;
            color: var(--text-mid);
            cursor: pointer;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            font-family: inherit;
            transition: all .15s;
            border-radius: 0;
            position: relative
        }

        .nav-item:hover {
            background: rgba(99, 102, 241, .05);
            color: var(--accent)
        }

        .nav-item.active {
            background: rgba(99, 102, 241, .08);
            color: var(--accent)
        }

        .nav-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 20%;
            height: 60%;
            width: 3px;
            background: var(--accent);
            border-radius: 0 4px 4px 0
        }

        .nav-badge {
            margin-left: auto;
            background: rgba(99, 102, 241, .12);
            color: var(--accent);
            padding: 1px 7px;
            border-radius: 10px;
            font-size: .64rem;
            font-weight: 800
        }

        .nav-badge-warn {
            background: rgba(245, 158, 11, .15);
            color: #D97706
        }

        .sidebar-footer {
            padding: 12px;
            border-top: 1.5px solid rgba(30, 27, 75, .06);
            display: flex;
            flex-direction: column;
            gap: 6px
        }

        .logout-btn-full {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px;
            border-radius: 10px;
            font-size: .82rem;
            font-weight: 800;
            cursor: pointer;
            border: 1.5px solid rgba(239, 68, 68, .25);
            background: rgba(239, 68, 68, .06);
            color: #DC2626;
            font-family: inherit;
            transition: all .15s
        }

        .logout-btn-full:hover {
            background: #DC2626;
            color: #fff
        }

        .home-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 8px;
            border-radius: 10px;
            font-size: .78rem;
            font-weight: 700;
            cursor: pointer;
            border: 1.5px solid rgba(30, 27, 75, .1);
            background: none;
            color: var(--text-mid);
            text-decoration: none;
            transition: all .15s
        }

        .home-btn:hover {
            background: rgba(30, 27, 75, .06);
            color: var(--text-dark)
        }

        .dash-content {
            min-width: 0
        }

        /* Stats mini row */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 20px
        }

        .stat-box {
            background: var(--white);
            border-radius: 12px;
            padding: 14px 16px;
            box-shadow: var(--shadow);
            border: 1.5px solid rgba(255, 255, 255, .9);
            text-align: center
        }

        .stat-box-num {
            font-size: 1.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text
        }

        .stat-box-label {
            font-size: .7rem;
            color: var(--text-mid);
            font-weight: 700;
            margin-top: 2px
        }

        /* Tab pane */
        .tab-pane {
            display: none
        }

        .tab-pane.active {
            display: block
        }

        /* Empty States */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            background: rgba(255, 255, 255, 0.4);
            border: 2px dashed rgba(30, 27, 75, 0.1);
            border-radius: 16px;
            text-align: center;
            margin-top: 20px;
        }

        .empty-state-svg {
            width: 120px;
            height: 120px;
            margin-bottom: 16px;
            opacity: 0.8;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .empty-state:hover .empty-state-svg {
            transform: scale(1.05) translateY(-5px);
        }

        .empty-state-title {
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 6px;
        }

        .empty-state-text {
            font-size: 0.85rem;
            color: var(--text-mid);
            max-width: 300px;
            line-height: 1.5;
        }

        /* Cards list */
        .card-list {
            display: flex;
            flex-direction: column;
            gap: 12px
        }

        .item-card {
            background: var(--white);
            border-radius: 14px;
            padding: 18px 20px;
            box-shadow: var(--shadow);
            border: 1.5px solid rgba(255, 255, 255, .9);
            display: flex;
            gap: 14px;
            align-items: flex-start;
            transition: transform .15s
        }

        .item-card:hover {
            transform: translateY(-2px)
        }

        .item-icon {
            font-size: 1.6rem;
            flex-shrink: 0;
            width: 40px;
            text-align: center
        }

        .item-body {
            flex: 1;
            min-width: 0
        }

        .item-title {
            font-size: .92rem;
            font-weight: 800
        }

        .item-sub {
            font-size: .78rem;
            color: var(--text-mid);
            margin-top: 2px
        }

        .item-badges {
            display: flex;
            gap: 6px;
            margin-top: 8px;
            flex-wrap: wrap
        }

        .badge {
            padding: 2px 10px;
            border-radius: 20px;
            font-size: .68rem;
            font-weight: 700
        }

        .badge-approved {
            background: rgba(22, 163, 74, .1);
            color: #16A34A
        }

        .badge-pending {
            background: rgba(245, 158, 11, .1);
            color: #D97706
        }

        .badge-rejected {
            background: rgba(239, 68, 68, .1);
            color: #DC2626
        }

        .item-actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
            align-items: center
        }

        .act-btn {
            padding: 6px 12px;
            border-radius: 8px;
            font-size: .72rem;
            font-weight: 700;
            cursor: pointer;
            transition: all .15s;
            border: 1.5px solid rgba(30, 27, 75, .08);
            background: var(--white);
            font-family: inherit
        }

        .act-btn:hover {
            border-color: var(--accent);
            color: var(--accent)
        }

        .act-btn-approve {
            border-color: #16A34A;
            color: #16A34A
        }

        .act-btn-approve:hover {
            background: #16A34A;
            color: #fff
        }

        .act-btn-reject {
            border-color: #DC2626;
            color: #DC2626
        }

        .act-btn-reject:hover {
            background: #DC2626;
            color: #fff
        }

        /* Form */
        .form-card {
            background: var(--white);
            border-radius: var(--radius);
            padding: 28px;
            box-shadow: var(--shadow);
            border: 1.5px solid rgba(255, 255, 255, .9)
        }

        .form-card h3 {
            font-size: 1.1rem;
            font-weight: 900;
            margin-bottom: 18px
        }

        .fg {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-bottom: 14px
        }

        .fg label {
            font-size: .72rem;
            font-weight: 700;
            color: var(--text-mid);
            text-transform: uppercase;
            letter-spacing: .4px
        }

        .fg input,
        .fg select,
        .fg textarea {
            padding: 10px 14px;
            border: 2px solid rgba(30, 27, 75, .1);
            border-radius: 10px;
            font-size: .85rem;
            font-family: inherit;
            outline: none;
            transition: border .2s;
            width: 100%
        }

        .fg input:focus,
        .fg select:focus,
        .fg textarea:focus {
            border-color: var(--accent)
        }

        .fg textarea {
            min-height: 80px;
            resize: vertical
        }

        .fg-row {
            display: flex;
            gap: 12px
        }

        .fg-row .fg {
            flex: 1
        }

        .submit-btn {
            padding: 12px 28px;
            border: none;
            border-radius: 12px;
            font-size: .9rem;
            font-weight: 800;
            font-family: inherit;
            cursor: pointer;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
            box-shadow: 0 4px 16px rgba(99, 102, 241, .25);
            transition: all .2s
        }

        .submit-btn:hover {
            transform: translateY(-2px)
        }

        .submit-btn:disabled {
            opacity: .6;
            cursor: not-allowed;
            transform: none
        }

        .empty-state {
            text-align: center;
            padding: 48px 20px;
            color: var(--text-mid)
        }

        .empty-state-icon {
            font-size: 2.5rem;
            margin-bottom: 8px
        }

        .empty-state-text {
            font-size: .9rem;
            font-weight: 700
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--text-dark);
            color: #fff;
            padding: 10px 22px;
            border-radius: 30px;
            font-size: .85rem;
            font-weight: 800;
            z-index: 9999;
            box-shadow: 0 6px 20px rgba(0, 0, 0, .25);
            transition: opacity .4s
        }

        /* Users grid */
        .users-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 14px
        }

        .user-card {
            background: var(--white);
            border-radius: 14px;
            padding: 18px;
            box-shadow: var(--shadow);
            border: 1.5px solid rgba(255, 255, 255, .9);
            display: flex;
            gap: 12px;
            align-items: center
        }

        .user-card-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            flex-shrink: 0
        }

        .user-card-info {
            flex: 1;
            min-width: 0
        }

        .user-card-name {
            font-weight: 800;
            font-size: .88rem
        }

        .user-card-email {
            font-size: .72rem;
            color: var(--text-mid);
            overflow: hidden;
            text-overflow: ellipsis
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-mid);
            font-weight: 700
        }

        @media(max-width:800px) {
            .dash-layout {
                grid-template-columns: 1fr;
            }

            .dash-sidebar {
                position: static;
                display: flex;
                flex-wrap: wrap;
                border-radius: 12px;
            }

            .sidebar-profile {
                display: none
            }

            .nav-group {
                padding: 6px 0
            }

            .sidebar-footer {
                flex-direction: row
            }

            .stats-row {
                grid-template-columns: repeat(2, 1fr)
            }
        }

        /* Overlay for Edit Modals */
        .edit-modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 999;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .edit-modal-overlay.open {
            display: flex;
        }

        .edit-modal {
            background: var(--white);
            border-radius: var(--radius);
            width: 100%;
            max-width: 600px;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.2);
            animation: modalIn 0.2s ease-out;
        }

        .edit-modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .edit-modal-header h3 {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--text-dark);
        }

        .edit-modal-close {
            background: var(--bg-alt);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .edit-modal-body {
            padding: 20px 24px;
            overflow-y: auto;
            flex: 1;
        }

        .edit-modal-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            background: var(--bg-main);
        }

        /* Versions Row */
        .versions-wrap {
            border: 2px solid var(--border);
            border-radius: var(--radius);
            padding: 12px;
            margin-top: 6px;
        }

        .version-row {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
            align-items: stretch;
        }

        .version-row .d-input {
            border: 1.5px solid var(--border);
            border-radius: 8px;
        }

        .add-version-btn {
            background: var(--bg-alt);
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 700;
            border: none;
            cursor: pointer;
            margin-top: 8px;
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }
    </style>
</head>

<body>
    <nav>
        <a class="nav-logo" href="index.html">🏭 SimHope AI 工具中心</a>
        <div class="nav-right">
            <div class="nav-user" id="navUser"></div>
            <button id="themeToggle" class="theme-btn" aria-label="Toggle Dark Mode" title="切換深色模式">🌙</button>
            <button class="nav-btn nav-btn-ghost" onclick="location.href='index.html'">回前台</button>
        </div>
    </nav>

    <div class="dash-layout">
        <aside class="dash-sidebar" id="dashSidebar">⏳ 載入中...</aside>
        <main class="dash-content" id="dashWrap">
            <div class="loading" id="loadingState">⏳ 載入中…</div>
        </main>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="data.js"></script>

    <script>
        let currentUser = null;
        let currentProfile = null;
        let myTools = [];
        let myPainCards = [];
        let pendingTools = [];
        let pendingPainCards = [];
        let allUsers = [];
        let allToolsAdmin = [];
        let allPainCardsAdmin = [];
        let editingToolId = null;
        let editingPainId = null;

        async function handleLogout() {
            await Auth.logout();
            location.href = 'auth.html';
        }

        function showToast(msg) {
            const t = document.createElement('div');
            t.className = 'toast'; t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 400); }, 2200);
        }

        // ── Init ──
        Auth.onAuthChange(async user => {
            if (!user) { location.href = 'auth.html'; return; }
            currentUser = user;
            currentProfile = await Auth.getUserProfile(user.uid);
            if (!currentProfile) {
                // Profile doesn't exist yet, create it
                await db.collection('users').doc(user.uid).set({
                    email: user.email,
                    displayName: user.displayName || user.email.split('@')[0],
                    role: 'developer',
                    avatarUrl: '',
                    bio: '',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                currentProfile = await Auth.getUserProfile(user.uid);
            }
            initDashboard();
        });

        async function initDashboard() {
            const isAdmin = currentProfile.role === 'admin';
            const name = currentProfile.displayName || currentUser.displayName || currentUser.email;

            // Nav user
            document.getElementById('navUser').innerHTML = `
                <div class="nav-avatar">${name.charAt(0).toUpperCase()}</div>
                <span>${name}</span>
            `;

            // Load data
            myTools = await FireDB.getToolsByAuthor(currentUser.uid);
            myPainCards = await FireDB.getPainCardsByAuthor(currentUser.uid);
            if (isAdmin) {
                pendingTools = await FireDB.getPendingTools();
                pendingPainCards = await FireDB.getPendingPainCards();
                allUsers = await FireDB.getAllUsers();
                allToolsAdmin = await FireDB.getAllTools();
                allPainCardsAdmin = await FireDB.getApprovedPainCards();
            }

            renderDashboard();

            // Handle URL Hash for tab selection
            const hash = window.location.hash.slice(1);
            if (hash && document.querySelector(`.nav-item[data-tab="${hash}"]`)) {
                switchTab(hash, false);

                // Expand parent group if needed
                const activeNav = document.querySelector(`.nav-item[data-tab="${hash}"]`);
                if (activeNav) {
                    const group = activeNav.closest('.nav-group-items');
                    if (group && group.classList.contains('collapsed')) {
                        toggleGroup(group.id);
                    }
                }
            } else {
                switchTab('my-tools', false); // default
            }
        }

        function switchTab(tabKey, updateHash = true) {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
            const ni = document.querySelector(`.nav-item[data-tab="${tabKey}"]`);
            if (ni) ni.classList.add('active');
            const pane = document.getElementById('pane-' + tabKey);
            if (pane) pane.classList.add('active');
            if (tabKey === 'chatbot-config') loadChatbotConfig();
            if (updateHash) {
                window.location.hash = tabKey;
            }
        }

        window.addEventListener('hashchange', () => {
            const hash = window.location.hash.slice(1);
            if (hash && document.querySelector(`.nav-item[data-tab="${hash}"]`)) {
                switchTab(hash, false);
            }
        });

        function toggleGroup(id) {
            const el = document.getElementById(id);
            const btn = el.previousElementSibling.querySelector('.nav-group-toggle');
            el.classList.toggle('collapsed');
            btn.textContent = el.classList.contains('collapsed') ? '▸' : '▾';
        }

        function renderDashboard() {
            const isAdmin = currentProfile.role === 'admin';
            const name = currentProfile.displayName || currentUser.email;
            const approvedTools = myTools.filter(t => t.approval === 'approved').length;
            const pendingCount = myTools.filter(t => t.approval === 'pending').length;
            const reviewCount = isAdmin ? (pendingTools.length + pendingPainCards.length) : 0;

            // ── Sidebar ──
            const sidebar = document.getElementById('dashSidebar');
            sidebar.innerHTML = `
                <div class="sidebar-profile">
                    <div class="sidebar-avatar">${name.charAt(0).toUpperCase()}</div>
                    <div class="sidebar-name">${name}</div>
                    <div class="sidebar-email">${currentProfile.email}</div>
                    <span class="sidebar-role ${isAdmin ? 'role-admin' : 'role-developer'}">${isAdmin ? '🛡️ 管理員' : '👨‍💻 開發者'}</span>
                </div>

                <!-- 我的內容 group -->
                <div class="nav-group">
                    <div class="nav-group-label">我的內容</div>
                    <div class="nav-group-items">
                        <button class="nav-item active" data-tab="my-tools" onclick="switchTab('my-tools')">🔧 我的工具 <span class="nav-badge">${myTools.length}</span></button>
                        <button class="nav-item" data-tab="my-pain" onclick="switchTab('my-pain')">😤 我的痛點 <span class="nav-badge">${myPainCards.length}</span></button>
                    </div>
                </div>

                <!-- 新增內容 group (collapsible) -->
                <div class="nav-group">
                    <div class="nav-group-label">
                        新增內容
                        <button class="nav-group-toggle" onclick="toggleGroup('group-add')">▾</button>
                    </div>
                    <div class="nav-group-items" id="group-add" style="max-height:200px">
                        <button class="nav-item" data-tab="new-tool" onclick="switchTab('new-tool')">➕ 新增工具</button>
                        <button class="nav-item" data-tab="new-pain" onclick="switchTab('new-pain')">➕ 新增痛點</button>
                    </div>
                </div>

                ${isAdmin ? `
                <!-- 管理員工具 group (collapsible) -->
                <div class="nav-group">
                    <div class="nav-group-label">
                        管理員工具
                        <button class="nav-group-toggle" onclick="toggleGroup('group-admin')">▾</button>
                    </div>
                    <div class="nav-group-items" id="group-admin" style="max-height:400px">
                        <button class="nav-item" data-tab="review" onclick="switchTab('review')">📋 審核佇列 ${reviewCount > 0 ? `<span class="nav-badge nav-badge-warn">${reviewCount}</span>` : ''}</button>
                        <button class="nav-item" data-tab="manage-all" onclick="switchTab('manage-all')">⚙️ 管理所有項目</button>
                        <button class="nav-item" data-tab="all-users" onclick="switchTab('all-users')">👥 所有開發者</button>
                        <button class="nav-item" data-tab="add-dev" onclick="switchTab('add-dev')">➕ 新增開發者</button>
                        <button class="nav-item" data-tab="chatbot-config" onclick="switchTab('chatbot-config')">🤖 Chatbot 設定</button>
                    </div>
                </div>
                ` : ''}

                <div class="sidebar-footer">
                    <a href="index.html" class="home-btn">← 回首頁</a>
                    <button class="logout-btn-full" onclick="handleLogout()">👋 登出</button>
                </div>
            `;

            // ── Content ──
            const wrap = document.getElementById('dashWrap');
            wrap.innerHTML = `
                <!-- Stats -->
                <div class="stats-row">
                    <div class="stat-box"><div class="stat-box-num">${myTools.length}</div><div class="stat-box-label">提交工具</div></div>
                    <div class="stat-box"><div class="stat-box-num">${approvedTools}</div><div class="stat-box-label">已上架</div></div>
                    <div class="stat-box"><div class="stat-box-num">${pendingCount}</div><div class="stat-box-label">待審核</div></div>
                    <div class="stat-box"><div class="stat-box-num">${myPainCards.length}</div><div class="stat-box-label">痛點卡片</div></div>
                </div>

                <!-- Tab Panes -->
                <div class="tab-pane active" id="pane-my-tools">${renderMyTools()}</div>
                <div class="tab-pane" id="pane-my-pain">${renderMyPainCards()}</div>
                <div class="tab-pane" id="pane-new-tool">${renderNewToolForm()}</div>
                <div class="tab-pane" id="pane-new-pain">${renderNewPainForm()}</div>
                <div class="tab-pane" id="pane-edit-tool">${renderEditToolForm()}</div>
                <div class="tab-pane" id="pane-edit-pain">${renderEditPainForm()}</div>
                ${isAdmin ? `<div class="tab-pane" id="pane-review">${renderReviewQueue()}</div>` : ''}
                ${isAdmin ? `<div class="tab-pane" id="pane-manage-all">${renderManageAll()}</div>` : ''}
                ${isAdmin ? `<div class="tab-pane" id="pane-all-users">${renderAllUsers()}</div>` : ''}
                ${isAdmin ? `<div class="tab-pane" id="pane-add-dev">${renderAddDeveloper()}</div>` : ''}
                ${isAdmin ? `<div class="tab-pane" id="pane-chatbot-config"><div id="chatbotConfigPane">載入中...</div></div>` : ''}
            `;
        }

        // ── Render: My Tools ──
        function renderMyTools() {
            if (!myTools.length) return `
                <div class="empty-state">
                    <svg class="empty-state-svg" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="100" cy="100" r="80" fill="#EEF2FF"/>
                        <path d="M120 70L80 110M80 70L120 110" stroke="#C7D2FE" stroke-width="8" stroke-linecap="round"/>
                        <rect x="70" y="130" width="60" height="12" rx="6" fill="#C7D2FE"/>
                    </svg>
                    <div class="empty-state-title">尚未提交任何工具</div>
                    <div class="empty-state-text">點擊左側「新增工具」將您的絕佳想法轉換為實用的 AI 工具吧！</div>
                </div>`;
            // Group by folder
            const groups = {};
            myTools.forEach(t => {
                const f = t.folder || '未分類專案';
                if (!groups[f]) groups[f] = [];
                groups[f].push(t);
            });

            return Object.entries(groups).sort().map(([folder, items]) => `
                <div class="folder-group" style="margin-bottom:1.5rem">
                    <h4 style="font-size:1rem;color:var(--text-dark);margin-bottom:0.8rem;display:flex;align-items:center;cursor:pointer;" onclick="this.nextElementSibling.style.display = this.nextElementSibling.style.display === 'none' ? 'block' : 'none'">
                         📁 ${folder} <span style="font-size:0.75rem;color:var(--text-mid);margin-left:8px;">(${items.length}) ▾</span>
                    </h4>
                    <div class="card-list" style="display:block;">${items.map(t => {
                const badgeCls = { approved: 'badge-approved', pending: 'badge-pending', rejected: 'badge-rejected' }[t.approval] || 'badge-pending';
                const badgeLabel = { approved: '✅ 已上架', pending: '⏳ 待審核', rejected: '❌ 未通過' }[t.approval] || '⏳ 待審核';
                return `<div class="item-card">
                            <div class="item-icon">${t.icon || '🛠️'}</div>
                            <div class="item-body">
                                <div class="item-title">${t.title || '無標題'}</div>
                                <div class="item-sub">${t.tagline || t.desc || ''}</div>
                                <div class="item-badges">
                                    <span class="badge ${badgeCls}">${badgeLabel}</span>
                                    ${t.rejectReason ? `<span class="badge badge-rejected">退回原因：${t.rejectReason}</span>` : ''}
                                </div>
                            </div>
                            <div class="item-actions">
                                <button class="act-btn" onclick="window.open('tool-detail.html?id=${t.id}', '_blank')">✏️ 編輯</button>
                                <button class="act-btn act-btn-reject" onclick="deleteItem('tool','${t.id}')">🗑️ 刪除</button>
                            </div>
                        </div>`;
            }).join('')}</div>
                </div>
            `).join('');
        }

        // ── Render: My Pain Cards ──
        function renderMyPainCards() {
            if (!myPainCards.length) return `
                <div class="empty-state">
                    <svg class="empty-state-svg" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="100" cy="100" r="80" fill="#FEF3C7"/>
                        <path d="M70 90C70 90 85 80 100 90C115 100 130 90 130 90" stroke="#FDE68A" stroke-width="8" stroke-linecap="round"/>
                        <circle cx="85" cy="120" r="8" fill="#FDE68A"/>
                        <circle cx="115" cy="120" r="8" fill="#FDE68A"/>
                    </svg>
                    <div class="empty-state-title">尚未提交任何痛點卡片</div>
                    <div class="empty-state-text">發現了流程中的不便？點擊「新增痛點」讓我們知道您的困擾。</div>
                </div>`;
            // Group by folder
            const groups = {};
            myPainCards.forEach(c => {
                const f = c.folder || '未分類專案';
                if (!groups[f]) groups[f] = [];
                groups[f].push(c);
            });

            return Object.entries(groups).sort().map(([folder, items]) => `
                <div class="folder-group" style="margin-bottom:1.5rem">
                    <h4 style="font-size:1rem;color:var(--text-dark);margin-bottom:0.8rem;display:flex;align-items:center;cursor:pointer;" onclick="this.nextElementSibling.style.display = this.nextElementSibling.style.display === 'none' ? 'block' : 'none'">
                         📁 ${folder} <span style="font-size:0.75rem;color:var(--text-mid);margin-left:8px;">(${items.length}) ▾</span>
                    </h4>
                    <div class="card-list" style="display:block;">${items.map(c => {
                const badgeCls = { approved: 'badge-approved', pending: 'badge-pending', rejected: 'badge-rejected' }[c.approval] || 'badge-pending';
                const badgeLabel = { approved: '✅ 已上架', pending: '⏳ 待審核', rejected: '❌ 未通過' }[c.approval] || '⏳ 待審核';
                return `<div class="item-card">
                            <div class="item-icon">😓</div>
                            <div class="item-body">
                                <div class="item-title">${c.before || ''}</div>
                                <div class="item-sub">✅ ${c.after || ''}</div>
                                <div class="item-badges"><span class="badge ${badgeCls}">${badgeLabel}</span></div>
                            </div>
                            <div class="item-actions">
                                <button class="act-btn" onclick="editPain('${c.id}')">✏️ 編輯</button>
                                <button class="act-btn act-btn-reject" onclick="deleteItem('pain','${c.id}')">🗑️ 刪除</button>
                            </div>
                        </div>`;
            }).join('')}</div>
                </div>
            `).join('');
        }

        // ── Render: New Tool Form ──
        function renderNewToolForm() {
            const isAdmin = currentProfile.role === 'admin';
            const statuses = DB.STATUSES;
            return `<div class="form-card">
                <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom: 20px;">
                    <h3 style="margin:0;">➕ 提交新工具</h3>
                    <button type="button" class="btn btn-sm" style="background: linear-gradient(135deg, #A78BFA, #F472B6); color: white; border:none; font-weight: bold; padding: 6px 12px; border-radius:8px; cursor:pointer;" onclick="toggleDashboardAIPanel()">🪄 請 AI 幫我填寫</button>
                </div>
                
                <!-- AI Assistant Panel -->
                <div id="dh-ai-panel" style="display:none; background: #FAF5FF; border: 2px dashed #D8B4FE; border-radius: 12px; padding: 15px; margin-bottom: 20px; transition: all 0.3s;">
                    <div style="font-size: 0.85rem; font-weight: bold; color: #7E22CE; margin-bottom: 8px;">✨ 描述你的工具，AI 會為你自動產出最棒的上架文案！</div>
                    <div style="display: flex; gap: 10px;">
                        <input id="dh-ai-prompt" type="text" style="flex:1; padding:10px 14px; border-radius:8px; border:2px solid #E5E7EB; margin-bottom:0; background: white;" placeholder="例如：我寫了一個查加工部報表錯字的小程式..." maxlength="100">
                        <button type="button" onclick="aiGenerateDashboardContent()" class="btn btn-primary" style="background: #9333EA; color:white; font-weight:bold; border-radius:8px; padding:0 20px; border: none; white-space: nowrap;" id="dh-ai-btn">魔術生成</button>
                    </div>
                    <div id="dh-ai-status" style="font-size: 0.75rem; color: #6B7280; margin-top: 8px; display: none;">AI 正在施展魔法中...</div>
                </div>

                <form id="newToolForm" onsubmit="handleSubmitTool(event)">
                    <div class="fg-row">
                        <div class="fg"><label>工具名稱 *</label><input id="nt-title" required placeholder="例：現場即時翻譯" /></div>
                        <div class="fg"><label>圖示 Emoji</label><input id="nt-icon" placeholder="🛠️" maxlength="4" /></div>
                    </div>
                    <div class="fg"><label>一句話介紹 *</label><input id="nt-tagline" required placeholder="泰文 ↔ 中文 ↔ 英文，三語即時切換" /></div>
                    <div class="fg"><label>詳細描述 *</label><textarea id="nt-desc" required placeholder="說明這個工具解決什麼問題…"></textarea></div>
                    <div class="fg-row">
                        <div class="fg"><label>所屬專案目錄（選填）</label><input id="nt-folder" placeholder="例：日報表專案" /></div>
                        <div class="fg"><label>適用場景（逗號分隔）</label><input id="nt-dept" placeholder="例：生產現場, 文書作業" /></div>
                    </div>
                    <div class="fg-row">
                        <div class="fg"><label>這是一個網頁工具，還是要下載的檔案？ *</label>
                            <select id="nt-type" onchange="toggleDashboardSourceType()" required>
                                <option value="webapp">🌐 網頁應用 (Web App)</option>
                                <option value="download">📁 檔案下載 (如 .exe)</option>
                                <option value="showcase">📺 展示型 (無連結)</option>
                            </select>
                        </div>
                        <div class="fg"><label>狀態</label><select id="nt-status">
                            ${isAdmin
                    ? Object.entries(statuses).map(([k, v]) => `<option value="${k}">${v.label}</option>`).join('')
                    : `<option value="dev">🔨 開發中</option><option value="beta">🧪 測試中</option><option value="pending">⏳ 待驗收</option>`
                }
                        </select></div>
                    </div>
                    <div id="dh-source-webapp">
                        <div class="fg"><label>網頁工具連結</label><input id="nt-url" type="url" placeholder="https://..." /></div>
                    </div>
                    <div id="dh-source-download" style="display:none; margin-bottom: 20px;">
                        <label>檔案下載連結 (Google Drive 等)</label>
                        <div style="background: #F3F4F6; padding: 20px; border-radius: 12px; border: 2px dashed #D1D5DB; text-align: center; margin-top: 5px;">
                            <div style="font-size: 2rem; margin-bottom: 5px;">☁️</div>
                            <div style="font-size: 0.95rem; font-weight: bold; color: #374151; margin-bottom: 5px;">檔案請存放於 Google Drive</div>
                            <div style="font-size: 0.8rem; color: #6B7280; margin-bottom: 12px;">直接將 .exe 或資料夾拖曳至雲端硬碟，開啟「知道連結的人均可檢視」即可。</div>
                            <input id="nt-file-url" type="url" placeholder="在此貼上 Google Drive 分享連結..." style="margin-bottom:0;" />
                        </div>
                    </div>

                    <div class="fg"><label>標籤（逗號分隔）</label><input id="nt-tags" placeholder="翻譯, 多語言, 現場使用" /></div>
                    <div class="fg"><label>使用步驟（逗號分隔，最多三步）</label><input id="nt-steps" placeholder="選語言, 說話或打字, 看翻譯結果" /></div>
                    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:20px;">
                        <button class="submit-btn" type="submit" id="ntSubmit" style="flex:1;">${isAdmin ? '🚀 直接上架' : '📤 提交審核'}</button>
                    </div>
                </form>
            </div>`;
        }
        
        // Expose a helper to attach UI events after render
        function toggleDashboardSourceType() {
            const el = document.getElementById('nt-type');
            if(!el) return;
            const t = el.value;
            const w = document.getElementById('dh-source-webapp');
            const d = document.getElementById('dh-source-download');
            if(w) w.style.display = (t === 'webapp') ? 'block' : 'none';
            if(d) d.style.display = (t === 'download') ? 'block' : 'none';
        }
        function toggleDashboardAIPanel() {
            const p = document.getElementById('dh-ai-panel');
            if(p) p.style.display = p.style.display === 'none' ? 'block' : 'none';
        }

        function renderNewPainForm() {
            const isAdmin = currentProfile.role === 'admin';
            return `<div class="form-card">
                <h3>➕ 提交新痛點卡片</h3>
                <form id="newPainForm" onsubmit="handleSubmitPain(event)">
                    <div class="fg-row">
                        <div class="fg"><label>所屬專案目錄（選填）</label><input id="np-folder" placeholder="例：跨國溝通專案" /></div>
                        <div class="fg"><label>適用場景（逗號分隔）</label><input id="np-dept" placeholder="例：生產現場, 文書作業" /></div>

                blog: { summary: '', blocks: [] }
            };

                data.url = document.getElementById('nt-file-url').value.trim();
                data.files = [];
                data.versions = [];
            } else {
                data.url = document.getElementById('nt-url').value.trim() || '#';

            try {
                if (isAdmin) {
                    await FireDB.submitToolDirect(data, currentUser.uid);

        // ── Add Developer (Admin) ──
        async function handleAddDeveloper(e) {
            e.preventDefault();
            const btn = document.getElementById('adSubmit');
            btn.disabled = true;
            btn.textContent = '建立中...';

            const name = document.getElementById('ad-name').value.trim();
            const email = document.getElementById('ad-email').value.trim();
            const pass = document.getElementById('ad-pass').value;
            const role = document.getElementById('ad-role').value;

            // 使用 Firebase REST API 建立帳號（不影響目前管理員 session）
            const apiKey = firebase.app().options.apiKey;
            try {
                const res = await fetch(
                    `https://identitytoolkit.googleapis.com/v1/accounts:signUp?key=${apiKey}`,
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password: pass, returnSecureToken: false })
                    }
                );
                const data = await res.json();
                if (data.error) throw new Error(data.error.message);

                const newUid = data.localId;
                // 建立 Firestore user doc
                await firebase.firestore().collection('users').doc(newUid).set({
                    email,
                    displayName: name,
                    role,
                    avatarUrl: '',
                    bio: '',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                // 更新 displayName（via REST）
                await fetch(
                    `https://identitytoolkit.googleapis.com/v1/accounts:update?key=${apiKey}`,
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ idToken: data.idToken, displayName: name })
                    }
                );

                const roleLabel = role === 'admin' ? '管理員' : '開發者';
                showToast(`✅ ${roleLabel}帳號「${name}」已建立！`);
                document.getElementById('addDevForm').reset();
                await initDashboard();
            } catch (err) {
                const msg = err.message === 'EMAIL_EXISTS' ? 'Email 已被使用' : err.message;
                showToast('❌ 建立失敗：' + msg);
            } finally {
                btn.disabled = false;
                btn.textContent = '+ 建立帳號';
            }
        }

        function editPain(id) {
            let c = myPainCards.find(x => x.id === id) || allPainCardsAdmin.find(x => x.id === id);
            if (!c) return;
            editingPainId = id;

            const deptInput = document.getElementById('ep-dept');
            const scs = c.scenarios && Array.isArray(c.scenarios) ? c.scenarios : (c.dept ? [(DB.DEPTS[c.dept]?.label || c.dept).replace(/^.*? /, '')] : ['其他']);
            deptInput.value = scs.join(', ');

            document.getElementById('ep-before').value = c.before || '';
            document.getElementById('ep-after').value = c.after || '';
            document.getElementById('editPainModal').classList.add('open');
        }

        async function handleUpdatePain(e) {
            e.preventDefault();
            if (!editingPainId) return;
            const btn = document.getElementById('epSubmit');
            btn.disabled = true;
            const isAdmin = currentProfile.role === 'admin';
            const data = {
                folder: document.getElementById('ep-folder').value.trim() || '未分類專案',

                before: document.getElementById('ep-before').value.trim(),
                after: document.getElementById('ep-after').value.trim()
            };
            try {
                await FireDB.updatePainCard(editingPainId, data);
                showToast('✅ 痛點卡片已更新');
                closeEditModal('pain');
                await initDashboard();
            } catch (err) {
                showToast('❌ 更新失敗：' + err.message);
            } finally {
                btn.disabled = false;
            }
        }

        function initTheme() {
            const themeBtn = document.getElementById('themeToggle');
            if (!themeBtn) return;
            const isDark = localStorage.getItem('simhope_theme') === 'dark';
            if (isDark) {
                document.documentElement.classList.add('dark');
                themeBtn.textContent = '☀️';
            }
            themeBtn.addEventListener('click', () => {
                const darkEnabled = document.documentElement.classList.toggle('dark');
                localStorage.setItem('simhope_theme', darkEnabled ? 'dark' : 'light');
                themeBtn.textContent = darkEnabled ? '☀️' : '🌙';
            });
        }
        document.addEventListener('DOMContentLoaded', initTheme);

            <div class="edit-modal-header">
                <h3>✏️ 編輯痛點卡片</h3>
                <button type="button" class="edit-modal-close" onclick="closeEditModal('pain')">×</button>
            </div>
            <div class="edit-modal-body">
                <div class="fg-row">
                    <div class="fg">
                        <label>所屬專案目錄</label>
                        <input type="text" id="ep-folder" placeholder="例：預設專案" />
                    </div>
                    <div class="fg">
                        <label>適用場景（逗號分隔）</label>
                        <input type="text" id="ep-dept" required placeholder="例：生產現場, 文書作業" />
                    </div>
                </div>
                <div class="fg">
                    <label>痛點 (Before)</label>
                    <textarea id="ep-before" rows="3" required></textarea>
                </div>
                <div class="fg">
                    <label>解決方案 (After)</label>
                    <textarea id="ep-after" rows="3" required></textarea>
                </div>
            </div>
            <div class="edit-modal-footer">
                <button type="button" class="act-btn" onclick="closeEditModal('pain')">取消</button>
                <button type="submit" class="submit-btn" id="epSubmit" style="padding:8px 16px;margin:0;">儲存變更</button>
            </div>
        </form>
    </div>

    <script>
        // ── LLM 文案助理 ──
        let _geminiKeyCache = null;

        async function loadGeminiKey() {
            if (_geminiKeyCache) return _geminiKeyCache;
            try {
                const doc = await firebase.firestore().collection('chatConfig').doc('settings').get();
                if (doc.exists && doc.data().geminiKey) {
                    _geminiKeyCache = doc.data().geminiKey;
                    return _geminiKeyCache;
                }
            } catch (_) { }
            return null;
        }

        async function callGemini(prompt) {
            const key = await loadGeminiKey();
            if (!key) throw new Error('尚未設定 Gemini API Key，請至「Chatbot 設定」頁面設定。');
            const res = await fetch(
                `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`,
                {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ role: 'user', parts: [{ text: prompt }] }],
                        generationConfig: { temperature: 0.6, maxOutputTokens: 800, responseMimeType: 'application/json' }
                    })
                }
            );
            if (res.status === 429) throw new Error('API 免費額度暫時用完，請稍後再試。');
            if (!res.ok) throw new Error('Gemini API 錯誤 ' + res.status);
            const data = await res.json();
            const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '{}';
            return JSON.parse(text.replace(/```json\n?|\n?```/g, '').trim());
        }

        async function aiGenerateDashboardContent() {
            const promptInput = document.getElementById('dh-ai-prompt').value.trim();
            if (!promptInput) {
                showToast('⚠️ 請先輸入一句話描述你的工具！');
                return;
            }
            
            const btn = document.getElementById('dh-ai-btn');
            const status = document.getElementById('dh-ai-status');
            btn.disabled = true;
            btn.textContent = '生成中...';
            status.style.display = 'block';

            try {
                const key = await loadGeminiKey();
                if (!key) throw new Error('找不到 Gemini API Key，請確定您已在 Chatbot 設定中輸入過。');
                
                const systemPrompt = `你是一個非常厲害的行銷企劃與產品經理。你要幫內部的開發者撰寫「工具上架文案」。
使用者會用一句話描述他的小工具，請生出吸引人、白話文的文案，並固定輸出為純 JSON 格式。

JSON Schema:
{
  "icon": "單一Emoji",
  "title": "簡短名稱 (約6-12字)",
  "tagline": "吸引人的副標題 (約10-25字)",
  "desc": "功能與價值說明 (約50-80字，對非技術人員要友善白話)",
  "dept": "factory 或 admin 或 mgmt 或 quality 或 defense 或 other (填入最適合的首選英文字)",
  "s1": "步驟1 (動詞開頭，最多8字)",
  "s2": "步驟2 (動詞開頭，最多8字)",
  "s3": "步驟3 (動詞開頭，最多8字)",
  "tags": ["關鍵字1", "關鍵字2", "關鍵字3"]
}
`;
                const res = await callGeminiRaw(systemPrompt + "\n使用者描述：" + promptInput, key);
                const result = res;

                const typeText = async (id, newText) => {
                    const el = document.getElementById(id);
                    if(!el) return;
                    el.value = '';
                    for (let char of newText) {
                        el.value += char;
                        await new Promise(r => setTimeout(r, 15));
                    }
                };
                
                await Promise.all([
                    typeText('nt-title', result.title || ''),
                    typeText('nt-tagline', result.tagline || ''),
                    typeText('nt-desc', result.desc || '')
                ]);
                
                // Dashboard new tool has single inputs for tags/steps
                if (result.tags && result.tags.length > 0) {
                    await typeText('nt-tags', result.tags.join(', '));
                }
                const stepsArray = [result.s1, result.s2, result.s3].filter(Boolean);
                if (stepsArray.length > 0) {
                    await typeText('nt-steps', stepsArray.join(', '));
                }
                
                if(result.icon) document.getElementById('nt-icon').value = result.icon;
                if(result.dept) document.getElementById('nt-dept').value = result.dept;
                
                showToast('✨ 魔法生成完成！你可以隨意微調修改。');
                toggleDashboardAIPanel();

            } catch (err) {
                console.error(err);
                alert('生成失敗：' + err.message);
            } finally {
                btn.disabled = false;
                btn.textContent = '魔術生成';
                status.style.display = 'none';
            }
        }
        
        async function callGeminiRaw(textContext, key) {
             const res = await fetch(
                 `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`,
                 {
                     method: 'POST',
                     headers: { 'Content-Type': 'application/json' },
                     body: JSON.stringify({
                         contents: [{ role: 'user', parts: [{ text: textContext }] }],
                         generationConfig: { temperature: 0.7, maxOutputTokens: 800, responseMimeType: 'application/json' }
                     })
                 }
             );
             if (!res.ok) throw new Error('API 呼叫失敗');
             const data = await res.json();
             const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '{}';
             return JSON.parse(text.replace(/```json\n?|\n?```/g, '').trim());
        }

        async function aiSuggestPain() {
            const panel = document.getElementById('np-ai-panel');
            if (!panel) return;
            const before = document.getElementById('np-before')?.value.trim();
            const after = document.getElementById('np-after')?.value.trim();
            if (!before && !after) {
                panel.innerHTML = `<div style="padding:12px;color:#e57;font-size:.82rem;border:1px solid #fee;border-radius:8px;margin-bottom:12px;">⚠️ 請先填寫使用前困境或使用後效益。</div>`;
                return;
            }
            panel.innerHTML = `<div style="padding:12px;font-size:.82rem;color:var(--text-mid);display:flex;align-items:center;gap:8px;"><span style="animation:spin 1s linear infinite;display:inline-block;">⏳</span> AI 正在優化文案中...</div>`;
            try {
                const prompt = `你是台灣製造業 AI 工具平台的文案顧問。根據以下痛點資訊，幫我優化描述，讓同仁更有共鳴、更具體：
使用前困境：${before || '（未填）'}
使用後效益：${after || '（未填）'}

規則：繁體中文、具體描述真實場景、帶情感但不誇張、語氣口語。
請以 JSON 格式回應 {"before":"...","after":"..."}`;
                const suggestions = await callGemini(prompt);
                renderAiPainPanel(panel, suggestions);
            } catch (e) {
                panel.innerHTML = `<div style="padding:12px;color:#e57;font-size:.82rem;border:1px solid #fee;border-radius:8px;margin-bottom:12px;">❌ ${e.message}</div>`;
            }
        }

        function renderAiPainPanel(panel, s) {
            const fields = [
                { label: '😓 使用前困境', key: 'before', id: 'np-before' },
                { label: '✅ 使用後效益', key: 'after', id: 'np-after' },
            ].filter(f => s[f.key]);
            if (!fields.length) { panel.innerHTML = ''; return; }
            panel.innerHTML = `
                <div style="border:1.5px dashed rgba(99,102,241,.35);border-radius:12px;padding:14px;margin-bottom:14px;background:rgba(99,102,241,.03);">
                    <div style="font-size:.8rem;font-weight:800;color:var(--accent);margin-bottom:10px;">✨ AI 建議（點「套用」填入表單）</div>
                    ${fields.map(f => `
                        <div style="margin-bottom:10px;">
                            <div style="font-size:.72rem;font-weight:700;color:var(--text-mid);margin-bottom:4px;">${f.label}</div>
                            <div style="font-size:.82rem;background:white;border:1px solid var(--border);border-radius:8px;padding:8px 10px;margin-bottom:4px;line-height:1.5;">${escapeHtml(s[f.key])}</div>
                            <button type="button" onclick="applyAiField('${f.id}','${escapeJs(s[f.key])}')" style="font-size:.72rem;padding:3px 10px;border:1px solid var(--accent);background:rgba(99,102,241,.08);color:var(--accent);border-radius:999px;cursor:pointer;font-family:inherit;font-weight:700;">套用</button>
                        </div>
                    `).join('')}
                    <button type="button" onclick="applyAllAiPain()" style="width:100%;margin-top:4px;padding:8px;border:none;background:var(--accent);color:white;border-radius:8px;cursor:pointer;font-weight:700;font-family:inherit;font-size:.82rem;">✅ 全部套用</button>
                </div>`;
            panel._suggestions = s;
        }

        function applyAllAiPain() {
            const panel = document.getElementById('np-ai-panel');
            const s = panel._suggestions;
            if (!s) return;
            if (s.before) applyAiField('np-before', s.before);
            if (s.after) applyAiField('np-after', s.after);
            panel.innerHTML = `<div style="padding:10px;font-size:.8rem;color:var(--green);margin-bottom:8px;">✅ 已套用所有 AI 建議啦！</div>`;
        }

        function applyAiField(id, value) {
            const el = document.getElementById(id);
            if (!el) return;
            el.value = value;
            el.style.transition = 'background 0.4s';
            el.style.background = 'rgba(99,102,241,0.08)';
            setTimeout(() => { el.style.background = ''; }, 800);
        }

        function escapeHtml(str) {
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }
        function escapeJs(str) {
            return String(str).replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/\n/g, '\\n');
        }
    </script>

    <script>
        // ── Chatbot Config Panel ──
        async function loadChatbotConfig() {
            const pane = document.getElementById('chatbotConfigPane');
            if (!pane) return;
            let cfg = { ollamaUrl: '', geminiKey: '', defaultBackend: 'local' };
            try {
                const db = firebase.firestore();
                const doc = await db.collection('chatConfig').doc('settings').get();
                if (doc.exists) cfg = { ...cfg, ...doc.data() };
            } catch (e) { }

            pane.innerHTML = `
                <div class="form-card">
                    <h3 style="margin-bottom:16px;">🤖 Chatbot 後端設定</h3>
                    <p style="font-size:.82rem;color:var(--text-mid);margin-bottom:20px;">這些設定儲存於 Firestore，即時生效，不需要改 code 或重新部署。</p>
                    <div class="fg">
                        <label>預設後端</label>
                        <select id="cfg-backend">
                            <option value="local" ${cfg.defaultBackend === 'local' ? 'selected' : ''}>🏠 本地 Ollama（私有，資料不上雲）</option>
                            <option value="cloud" ${cfg.defaultBackend === 'cloud' ? 'selected' : ''}>☁️ 雲端 Gemini API（需要 API Key）</option>
                        </select>
                    </div>
                    <div class="fg">
                        <label>🏠 Ollama Tunnel URL</label>
                        <input id="cfg-ollama" type="url" value="${cfg.ollamaUrl || ''}" placeholder="https://xxxx.trycloudflare.com" />
                        <small style="color:var(--text-mid);font-size:.75rem;">Cloudflare tunnel 重啟後在這裡更新 → 馬上生效</small>
                    </div>
                    <div class="fg">
                        <label>☁️ Gemini API Key</label>
                        <input id="cfg-gemini" type="password" value="${cfg.geminiKey || ''}" placeholder="AIza..." />
                        <small style="color:var(--text-mid);font-size:.75rem;">Key 只存在 Firestore，不暴露在前端 code。免費額度：15 次/分鐘、1500 次/天</small>
                    </div>
                    <div class="fg" style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
                        <button class="submit-btn" style="width:auto;padding:10px 20px;" onclick="saveChatbotConfig()">💾 儲存設定</button>
                        <button class="act-btn" style="border:1.5px solid var(--border)" onclick="testOllama()">🔌 測試 Ollama 連線</button>
                        <span id="cfg-status" style="font-size:.8rem;"></span>
                    </div>
                </div>`;
        }

        async function saveChatbotConfig() {
            const ollamaUrl = document.getElementById('cfg-ollama')?.value.trim() || '';
            const geminiKey = document.getElementById('cfg-gemini')?.value.trim() || '';
            const defaultBackend = document.getElementById('cfg-backend')?.value || 'local';
            const status = document.getElementById('cfg-status');
            try {
                const db = firebase.firestore();
                await db.collection('chatConfig').doc('settings').set({ ollamaUrl, geminiKey, defaultBackend }, { merge: true });
                if (status) status.textContent = '✅ 已儲存';
                setTimeout(() => { if (status) status.textContent = ''; }, 3000);
            } catch (e) {
                if (status) status.textContent = '❌ 儲存失敗：' + e.message;
            }
        }

        async function testOllama() {
            const url = document.getElementById('cfg-ollama')?.value.trim();
            const status = document.getElementById('cfg-status');
            if (!url) { if (status) status.textContent = '⚠️ 請先輸入 URL'; return; }
            if (status) status.textContent = '🔌 連線中...';
            try {
                const res = await fetch(url + '/api/tags', { signal: AbortSignal.timeout(5000) });
                if (res.ok) {
                    const data = await res.json();
                    const models = (data.models || []).map(m => m.name).join(', ') || '無模型';
                    if (status) status.textContent = `✅ 已連線！模型：${models}`;
                } else {
                    if (status) status.textContent = `❌ 回應 ${res.status}`;
                }
            } catch (e) {
                if (status) status.textContent = `❌ 連線失敗：${e.message}`;
            }
        }
    </script>

</body>
