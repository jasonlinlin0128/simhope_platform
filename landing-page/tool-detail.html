            closeSlashMenu();

            // Convert current block to selected type
            blocks[idx] = { type, content: originalContent };
            if (type === 'table') blocks[idx].rows = [['欄位1', '欄位2', '欄位3'], ['', '', ''], ['', '', '']];
            if (type === 'image') { blocks[idx].url = ''; blocks[idx].caption = ''; }
            if (type === 'video') { blocks[idx].url = ''; blocks[idx].caption = ''; }

            saveBlog();
            renderBlocks();

            setTimeout(() => {
                const el = document.querySelector(`.block-row[data-idx="${idx}"] .block-content[contenteditable]`);
                if (el) {
                    el.focus();
                    try {
                        const range = document.createRange();
                        const sel = window.getSelection();
                        if (el.childNodes.length > 0) {
                            range.selectNodeContents(el);
                            range.collapse(false); // Collapse to the end
                        }
                        sel.removeAllRanges();
                        sel.addRange(range);
                    } catch (e) { }
                }
            }, 50);
        }

        function closeSlashMenu() {
            if (slashMenu) slashMenu.classList.remove('active');
            slashTarget = null;
        }

        // Close slash menu on outside click
        document.addEventListener('mousedown', e => {
            if (slashMenu.classList.contains('active') && !slashMenu.contains(e.target) && !e.target.closest('.block-content[contenteditable]')) {
                closeSlashMenu();
            }
        });

        // ═══════════════════════════════
        // SAVE
        // ═══════════════════════════════

        function saveBlog() {
            if (!tool) return;
            // Sync all contenteditable blocks
            document.querySelectorAll('.block-content[contenteditable]').forEach(el => syncBlockContent(el));
            const tools = DB.getTools();
            const idx = tools.findIndex(t => t.id === tool.id);
            if (idx < 0) return;

            // Gather Inline Edits
            tools[idx].icon = document.getElementById('sbIcon').textContent.trim();
            tools[idx].title = document.getElementById('sbTitle').textContent.trim();
            tools[idx].tagline = document.getElementById('sbTagline').textContent.trim();
            tools[idx].desc = document.getElementById('mainSummary')?.textContent || '';
            tools[idx].tags = tool.tags || [];

            const typeSel = document.getElementById('editTypeSelect');
            if (typeSel) tools[idx].type = typeSel.value;

            const deptSel = document.getElementById('editDeptSelect');
            if (deptSel) tools[idx].dept = deptSel.value;

            const statusSel = document.getElementById('editStatusSelect');
            if (statusSel) tools[idx].status = statusSel.value;

            const urlInput = document.getElementById('sbUrlInput');
            if (urlInput) tools[idx].url = urlInput.value.trim();

            const stepsInput = document.getElementById('sbStepsInput');
            if (stepsInput) {
                tools[idx].steps = stepsInput.value.split(',').map(s => s.trim()).filter(Boolean);
            }

            const versionsWrap = document.getElementById('sbVersionsWrap');
            if (versionsWrap) {
                const rows = versionsWrap.querySelectorAll('.version-row');
                const versions = [];
                rows.forEach(r => {
                    versions.push({
                        version: r.querySelector('.v-ver').value.trim(),
                        releaseNotes: r.querySelector('.v-note').value.trim(),
                        fileUrl: r.querySelector('.v-url').value.trim(),
                    });
                });
                tools[idx].versions = versions;
            }

            if (!tools[idx].blog) tools[idx].blog = {};
            tools[idx].blog.blocks = blocks;
            tools[idx].blog.summary = tools[idx].desc; // keep them in sync

            DB.saveTools(tools);

            // Re-render CTA and Title instantly
            document.getElementById('adminBarTitle').textContent = '✏️ 編輯：' + tools[idx].title;
            document.getElementById('breadcrumbTitle').textContent = tools[idx].title;
            const cta = document.getElementById('sbCta');
            let ctaHtml = '';
            if (tools[idx].type === 'webapp' && tools[idx].url && tools[idx].url !== '#' && tools[idx].status !== 'terminated') {
                ctaHtml += `<a class="cta-btn cta-btn-primary" href="${tools[idx].url}" target="_blank">🚀 前往使用</a>`;
            }
            ctaHtml += `<a class="cta-btn cta-btn-secondary" href="index.html">← 回工具總覽</a>`;
            cta.innerHTML = ctaHtml;

            showToast('💾 已儲存！變更已生效。');
        }

        // ── Toast ──
        function showToast(msg) {
            const t = document.createElement('div');
            t.className = 'toast'; t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 400); }, 2200);
        }

        // ── Keyboard shortcut: Ctrl+S ──
        document.addEventListener('keydown', e => {
            if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); if (isAdmin) saveBlog(); }
        });

        // ── INIT (must be AFTER all declarations) ──
        if (tool) initPage(tool);
    </script>
