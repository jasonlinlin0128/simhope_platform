<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8" />
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏭</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>登入 / 註冊 — SimHope AI 工具中心</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap"
        rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --accent: #6366F1;
            --accent2: #8B5CF6;
            --text-dark: #1E1B4B;
            --text-mid: #6B7280;
            --bg: linear-gradient(135deg, #E0E7FF 0%, #F0FDF4 40%, #FEF9C3 100%);
            --white: #FFFFFF;
            --radius: 18px;
            --shadow: 0 8px 32px rgba(30, 27, 75, 0.06);
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-dark);
        }

        .auth-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .auth-card {
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 2px solid rgba(255, 255, 255, 0.9);
            padding: 40px 32px;
            position: relative;
            overflow: hidden;
        }

        .auth-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--accent), var(--accent2), #EC4899);
        }

        .auth-logo {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 8px;
        }

        .auth-title {
            text-align: center;
            font-size: 1.4rem;
            font-weight: 900;
            margin-bottom: 4px;
        }

        .auth-subtitle {
            text-align: center;
            font-size: .82rem;
            color: var(--text-mid);
            margin-bottom: 28px;
        }

        /* Tabs */
        .auth-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 24px;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid rgba(99, 102, 241, 0.15);
        }

        .auth-tab {
            flex: 1;
            padding: 10px 0;
            text-align: center;
            font-size: .85rem;
            font-weight: 700;
            cursor: pointer;
            transition: all .2s;
            background: transparent;
            color: var(--text-mid);
            border: none;
        }

        .auth-tab.active {
            background: var(--accent);
            color: white;
        }

        .auth-tab:not(.active):hover {
            background: rgba(99, 102, 241, 0.06);
        }

        /* Form */
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .auth-form[hidden] {
            display: none;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .form-label {
            font-size: .75rem;
            font-weight: 700;
            color: var(--text-mid);
            text-transform: uppercase;
            letter-spacing: .5px;
        }

        .form-input {
            padding: 12px 14px;
            border: 2px solid rgba(30, 27, 75, 0.1);
            border-radius: 10px;
            font-size: .9rem;
            font-family: inherit;
            outline: none;
            transition: border-color .2s;
        }

        .form-input:focus {
            border-color: var(--accent);
        }

        .auth-btn {
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: .95rem;
            font-weight: 800;
            font-family: inherit;
            cursor: pointer;
            transition: all .2s;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: white;
            box-shadow: 0 4px 16px rgba(99, 102, 241, 0.3);
            margin-top: 4px;
        }

        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
        }

        .auth-btn:disabled {
            opacity: .6;
            cursor: not-allowed;
            transform: none;
        }

        .auth-error {
            background: #FEF2F2;
            color: #DC2626;
            border: 1.5px solid #FECACA;
            border-radius: 10px;
            padding: 10px 14px;
            font-size: .8rem;
            font-weight: 600;
            display: none;
        }

        .auth-error.show {
            display: block;
        }

        .auth-success {
            background: #F0FDF4;
            color: #16A34A;
            border: 1.5px solid #BBF7D0;
            border-radius: 10px;
            padding: 10px 14px;
            font-size: .8rem;
            font-weight: 600;
            display: none;
        }

        .auth-success.show {
            display: block;
        }

        .auth-footer {
            text-align: center;
            margin-top: 20px;
            font-size: .78rem;
            color: var(--text-mid);
        }

        .auth-footer a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 700;
        }

        /* Already logged in state */
        .logged-in-card {
            text-align: center;
            padding: 24px 0;
        }

        .logged-in-avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: white;
            font-size: 1.8rem;
            font-weight: 900;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
        }

        .logged-in-name {
            font-size: 1.1rem;
            font-weight: 800;
        }

        .logged-in-role {
            font-size: .78rem;
            color: var(--text-mid);
            font-weight: 600;
            margin-bottom: 20px;
        }

        .logged-in-actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .li-btn {
            padding: 12px;
            border-radius: 10px;
            font-size: .88rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            transition: all .2s;
            border: none;
        }

        .li-btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: white;
            box-shadow: 0 4px 16px rgba(99, 102, 241, 0.25);
        }

        .li-btn-primary:hover {
            transform: translateY(-2px);
        }

        .li-btn-secondary {
            background: rgba(30, 27, 75, 0.05);
            color: var(--text-dark);
        }

        .li-btn-secondary:hover {
            background: rgba(30, 27, 75, 0.1);
        }

        .li-btn-danger {
            background: none;
            color: #DC2626;
            font-size: .8rem;
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <!-- Not logged in -->
            <div id="authPanel">
                <div class="auth-logo">🏭</div>
                <div class="auth-title">SimHope AI 工具中心</div>
                <div class="auth-subtitle">開發者 / 管理員登入</div>

                <div class="auth-tabs">
                    <button class="auth-tab active" onclick="switchTab('login')">登入</button>
                    <button class="auth-tab" onclick="switchTab('register')">註冊開發者</button>
                </div>

                <div class="auth-error" id="authError"></div>
                <div class="auth-success" id="authSuccess"></div>

                <!-- Login Form -->
                <form class="auth-form" id="loginForm" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input class="form-input" type="email" id="loginEmail" required placeholder="you@company.com" />
                    </div>
                    <div class="form-group">
                        <label class="form-label">密碼</label>
                        <input class="form-input" type="password" id="loginPassword" required placeholder="••••••••" />
                    </div>
                    <button class="auth-btn" type="submit" id="loginBtn">🔐 登入</button>
                </form>

                <!-- Register Form -->
                <form class="auth-form" id="registerForm" hidden onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label class="form-label">顯示名稱</label>
                        <input class="form-input" type="text" id="regName" required placeholder="例：王小明" />
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input class="form-input" type="email" id="regEmail" required placeholder="you@company.com" />
                    </div>
                    <div class="form-group">
                        <label class="form-label">密碼（至少 6 位）</label>
                        <input class="form-input" type="password" id="regPassword" required minlength="6"
                            placeholder="••••••••" />
                    </div>
                    <button class="auth-btn" type="submit" id="regBtn">✨ 註冊為開發者</button>
                </form>
            </div>

            <!-- Already logged in -->
            <div id="loggedInPanel" style="display:none">
                <div class="logged-in-card">
                    <div class="logged-in-avatar" id="liAvatar">?</div>
                    <div class="logged-in-name" id="liName">載入中…</div>
                    <div class="logged-in-role" id="liRole"></div>
                    <div class="logged-in-actions">
                        <a class="li-btn li-btn-primary" href="dashboard.html">📊 前往 Dashboard</a>
                        <a class="li-btn li-btn-secondary" href="index.html">← 回工具中心</a>
                        <button class="li-btn li-btn-danger" onclick="handleLogout()">登出</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="auth-footer">
            <a href="index.html">← 回工具中心首頁</a>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>

    <script>
        // ── Tab UI ──
        function switchTab(tab) {
            document.querySelectorAll('.auth-tab').forEach((t, i) => {
                t.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'register' && i === 1));
            });
            document.getElementById('loginForm').hidden = tab !== 'login';
            document.getElementById('registerForm').hidden = tab !== 'register';
            hideMessages();
        }

        function showError(msg) {
            const el = document.getElementById('authError');
            el.textContent = msg; el.classList.add('show');
            document.getElementById('authSuccess').classList.remove('show');
        }
        function showSuccess(msg) {
            const el = document.getElementById('authSuccess');
            el.textContent = msg; el.classList.add('show');
            document.getElementById('authError').classList.remove('show');
        }
        function hideMessages() {
            document.getElementById('authError').classList.remove('show');
            document.getElementById('authSuccess').classList.remove('show');
        }

        function firebaseErrorMsg(code) {
            const map = {
                'auth/email-already-in-use': '此 Email 已被註冊',
                'auth/weak-password': '密碼至少需要 6 個字元',
                'auth/invalid-email': 'Email 格式不正確',
                'auth/user-not-found': '找不到此帳號',
                'auth/wrong-password': '密碼錯誤',
                'auth/invalid-credential': 'Email 或密碼錯誤',
                'auth/too-many-requests': '嘗試次數過多，請稍後再試',
            };
            return map[code] || '發生錯誤，請重試';
        }

        // ── Login ──
        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            btn.disabled = true; btn.textContent = '登入中…';
            hideMessages();
            try {
                const email = document.getElementById('loginEmail').value;
                const password = document.getElementById('loginPassword').value;
                await Auth.login(email, password);
                showSuccess('✅ 登入成功，正在跳轉…');
                setTimeout(() => location.href = 'dashboard.html', 800);
            } catch (err) {
                showError(firebaseErrorMsg(err.code));
            } finally {
                btn.disabled = false; btn.textContent = '🔐 登入';
            }
        }

        // ── Register ──
        async function handleRegister(e) {
            e.preventDefault();
            const btn = document.getElementById('regBtn');
            btn.disabled = true; btn.textContent = '註冊中…';
            hideMessages();
            try {
                const name = document.getElementById('regName').value.trim();
                const email = document.getElementById('regEmail').value;
                const password = document.getElementById('regPassword').value;
                await Auth.register(email, password, name);
                showSuccess('✅ 註冊成功！正在跳轉到 Dashboard…');
                setTimeout(() => location.href = 'dashboard.html', 1000);
            } catch (err) {
                showError(firebaseErrorMsg(err.code));
            } finally {
                btn.disabled = false; btn.textContent = '✨ 註冊為開發者';
            }
        }

        // ── Logout ──
        async function handleLogout() {
            await Auth.logout();
            location.reload();
        }

        // ── Check if already logged in ──
        Auth.onAuthChange(async user => {
            if (user) {
                document.getElementById('authPanel').style.display = 'none';
                document.getElementById('loggedInPanel').style.display = 'block';

                const profile = await Auth.getUserProfile(user.uid);
                const name = profile?.displayName || user.displayName || user.email;
                document.getElementById('liAvatar').textContent = name.charAt(0).toUpperCase();
                document.getElementById('liName').textContent = name;

                const roleLabels = { admin: '🛡️ 系統管理員', developer: '👨‍💻 開發者' };
                document.getElementById('liRole').textContent = roleLabels[profile?.role] || '👨‍💻 開發者';
            } else {
                document.getElementById('authPanel').style.display = 'block';
                document.getElementById('loggedInPanel').style.display = 'none';
            }
        });
    </script>
</body>

</html>
